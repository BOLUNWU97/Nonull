# =============================================================================
# LiteLLM 网关配置 / LiteLLM gateway config (multi-key + cloud + local)
# =============================================================================
# 用法 / Usage:
#   pip install litellm[proxy]
#   litellm --config multimodel/litellm_config.yaml --port 4000
# 然后把 Nonull 的模型 base_url 指向 http://localhost:4000 即可 (见 nonull_models.yaml)。
# Point your model base_url at http://localhost:4000 and LiteLLM unifies all providers.
#
# 说明 / Notes:
# - model_list 里每个条目是一个"部署"(deployment)。同一 model_name 多条 = 负载均衡组,
#   LiteLLM 自动在多 Key / 多部署间轮询 + 失败重试。
# - 环境变量用 os.environ/KEY 引用, 不要把真实 Key 写进文件 (提交泄漏)。
# =============================================================================

model_list:
  # ── OpenAI (多 Key 负载均衡组) ──────────────────────────────
  - model_name: gpt-4o                      # 逻辑名 (调用时用)
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY_1
  - model_name: gpt-4o                      # 同名第二个 Key → 自动轮询
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY_2
  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY_1

  # ── Anthropic Claude ────────────────────────────────────────
  - model_name: claude-sonnet
    litellm_params:
      model: anthropic/claude-3-5-sonnet-20241022
      api_key: os.environ/ANTHROPIC_API_KEY

  # ── DeepSeek (云端) ─────────────────────────────────────────
  - model_name: deepseek-chat
    litellm_params:
      model: deepseek/deepseek-chat
      api_key: os.environ/DEEPSEEK_API_KEY
  - model_name: deepseek-reasoner
    litellm_params:
      model: deepseek/deepseek-reasoner
      api_key: os.environ/DEEPSEEK_API_KEY

  # ── 通义千问 Qwen (DashScope OpenAI 兼容模式) ───────────────
  - model_name: qwen-max
    litellm_params:
      model: openai/qwen-max               # 走 OpenAI 兼容端点
      api_key: os.environ/DASHSCOPE_API_KEY
      api_base: https://dashscope.aliyuncs.com/compatible-mode/v1
  - model_name: qwen-turbo                 # 小模型, 简单任务
    litellm_params:
      model: openai/qwen-turbo
      api_key: os.environ/DASHSCOPE_API_KEY
      api_base: https://dashscope.aliyuncs.com/compatible-mode/v1

  # ── Ollama 本地 (隐私任务) ──────────────────────────────────
  - model_name: ollama-llama3
    litellm_params:
      model: ollama/llama3.1
      api_base: http://localhost:11434     # Ollama 默认端口
  - model_name: ollama-qwen
    litellm_params:
      model: ollama/qwen2.5:7b
      api_base: http://localhost:11434

  # ── LM Studio 本地 (OpenAI 兼容) ────────────────────────────
  - model_name: lmstudio-local
    litellm_params:
      model: openai/local-model            # LM Studio 里加载的模型名
      api_base: http://localhost:1234/v1
      api_key: lm-studio                    # LM Studio 占位 key

# ── 路由器设置 / Router settings ──────────────────────────────
router_settings:
  routing_strategy: usage-based-routing-v2  # 按用量负载均衡
  num_retries: 2                            # 失败重试
  timeout: 30
  allowed_fails: 3                          # 连续失败 3 次后冷却该部署
  cooldown_time: 60                         # 冷却 60s
  retry_after: 5
  # 失败降级链: 强模型 → 备选
  fallbacks:
    - gpt-4o: ["claude-sonnet", "deepseek-chat"]
    - claude-sonnet: ["gpt-4o", "deepseek-chat"]
    - qwen-max: ["deepseek-chat", "gpt-4o"]

# ── 通用设置 / General ────────────────────────────────────────
litellm_settings:
  drop_params: true                         # 自动丢弃厂商不支持的参数
  set_verbose: false
  cache: true                               # 启用响应缓存 (相同请求省成本)
  cache_params:
    type: local                             # local / redis
  # 调用日志: 落地到 langfuse/文件等 (可选)
  success_callback: []                      # 如 ["langfuse"]
  failure_callback: []

# ── 全局成本预算守卫 (可选) ───────────────────────────────────
general_settings:
  max_budget: 50.0                          # 全局预算上限 (USD)
  budget_duration: 30d
