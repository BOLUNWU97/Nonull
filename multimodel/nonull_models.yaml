# =============================================================================
# Nonull 多模型注册配置 / Nonull model registry config
# =============================================================================
# 被 multimodel.ModelRegistry.from_config() 读取 (config.get_section("models"))。
# 加载方式: NonullConfig().load_yaml("multimodel/nonull_models.yaml")
# 或合并进主 config.yaml 的 models: 段。
#
# 两种部署模式 (二选一):
#   A) 直连模式: 每个模型直接配厂商 base_url + api_keys (本文件示例, 不依赖 LiteLLM)
#   B) LiteLLM 网关模式: 所有模型 base_url 都指向 http://localhost:4000,
#      api_keys 填 LiteLLM 的 master key (见文件末尾注释)
#
# Key 安全: 真实 Key 用环境变量, 这里只占位。生产用 ${ENV_VAR} 由 config 层展开,
# 或在代码里 reg.get(name).api_keys = [os.environ[...]] 注入。
# =============================================================================

models:
  # ── 强模型 (复杂任务) / Large-tier (complex tasks) ──────────
  reasoner:
    model_id: deepseek-reasoner
    provider: deepseek
    base_url: https://api.deepseek.com/v1
    api_keys:                               # 多 Key 轮询负载均衡
      - ${DEEPSEEK_API_KEY_1}
      - ${DEEPSEEK_API_KEY_2}
    tier: large
    privacy: public
    cost_per_1k_in: 0.00055
    cost_per_1k_out: 0.0022
    avg_latency_ms: 3000
    priority: 100
    max_tokens: 8192
    context_window: 64000
    tags: [reasoning, code, long-context]

  gpt4o:
    model_id: gpt-4o
    provider: openai
    base_url: https://api.openai.com/v1
    api_keys:
      - ${OPENAI_API_KEY_1}
      - ${OPENAI_API_KEY_2}
    tier: large
    privacy: public
    cost_per_1k_in: 0.0025
    cost_per_1k_out: 0.01
    avg_latency_ms: 2000
    priority: 90
    max_tokens: 8192
    context_window: 128000
    tags: [general, code, vision]

  claude:
    model_id: claude-3-5-sonnet-20241022
    provider: claude
    base_url: https://api.anthropic.com/v1   # 经 LiteLLM 时改 http://localhost:4000
    api_keys:
      - ${ANTHROPIC_API_KEY}
    tier: large
    privacy: public
    cost_per_1k_in: 0.003
    cost_per_1k_out: 0.015
    avg_latency_ms: 2500
    priority: 95
    max_tokens: 8192
    context_window: 200000
    tags: [reasoning, writing, code]

  qwen-max:
    model_id: qwen-max
    provider: qwen
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    api_keys:
      - ${DASHSCOPE_API_KEY}
    tier: large
    privacy: public
    cost_per_1k_in: 0.0024
    cost_per_1k_out: 0.0096
    avg_latency_ms: 2200
    priority: 80
    max_tokens: 8192
    context_window: 32000
    tags: [chinese, general]

  # ── 小模型 (简单任务) / Small-tier (simple tasks) ───────────
  fast-mini:
    model_id: gpt-4o-mini
    provider: openai
    base_url: https://api.openai.com/v1
    api_keys:
      - ${OPENAI_API_KEY_1}
    tier: small
    privacy: public
    cost_per_1k_in: 0.00015
    cost_per_1k_out: 0.0006
    avg_latency_ms: 800
    priority: 50
    max_tokens: 2048
    tags: [fast, cheap, chat]

  qwen-turbo:
    model_id: qwen-turbo
    provider: qwen
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    api_keys:
      - ${DASHSCOPE_API_KEY}
    tier: small
    privacy: public
    cost_per_1k_in: 0.0001
    cost_per_1k_out: 0.0003
    avg_latency_ms: 600
    priority: 45
    max_tokens: 2048
    tags: [fast, cheap, chinese]

  # ── 本地模型 (隐私任务, 强制路由) / Local (privacy-forced) ──
  local-llama:
    model_id: llama3.1
    provider: ollama
    base_url: http://localhost:11434/v1     # Ollama OpenAI 兼容端点
    api_keys: ["ollama"]                     # 本地无需真 key
    tier: local
    privacy: internal
    is_local: true
    cost_per_1k_in: 0.0                       # 本地零成本
    cost_per_1k_out: 0.0
    avg_latency_ms: 1500
    priority: 70
    max_tokens: 4096
    context_window: 32000
    tags: [local, privacy, free]

  local-qwen:
    model_id: qwen2.5:7b
    provider: ollama
    base_url: http://localhost:11434/v1
    api_keys: ["ollama"]
    tier: local
    privacy: confidential
    is_local: true
    cost_per_1k_in: 0.0
    cost_per_1k_out: 0.0
    avg_latency_ms: 1200
    priority: 65
    tags: [local, privacy, chinese]

  lmstudio:
    model_id: local-model
    provider: lmstudio
    base_url: http://localhost:1234/v1       # LM Studio 端点
    api_keys: ["lm-studio"]
    tier: local
    privacy: internal
    is_local: true
    cost_per_1k_in: 0.0
    cost_per_1k_out: 0.0
    avg_latency_ms: 2000
    tags: [local, privacy]

# ── 路由策略 / Routing strategy ───────────────────────────────
routing:
  strategy: balanced            # quality | cost | speed | balanced
  force_local_on_privacy: true  # 内网/机密数据强制本地模型

# =============================================================================
# LiteLLM 网关模式 (模式 B): 把上面所有 base_url 改成 http://localhost:4000,
# api_keys 填 ["${LITELLM_MASTER_KEY}"], model_id 用 litellm_config.yaml 里的
# model_name (如 gpt-4o / deepseek-reasoner / ollama-llama3)。这样 Nonull 只跟
# LiteLLM 一个端点对话, 厂商差异/重试/负载均衡全由 LiteLLM 处理。
# =============================================================================
