name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check core/ memory/ safety/ skills/ orchestration/ persona/ channels/ hooks/ nonull/ || echo "ruff not strict"

      - name: Verify package can be imported
        run: |
          python -c "from core import NonullConfig; print('core OK')"
          python -c "from channels import CLIChannel; print('channels OK')"
          python -c "from persona import PersonaOrchestrator, PersonaType, ScenarioEngine, SafetyBadgeSystem; print('persona OK')"
          python -c "from safety import SafetyGuardian; print('safety OK')"
          python -c "from memory import Neocortex; print('memory OK')"
          python -c "from skills import SkillRegistry; print('skills OK')"
          python -c "from orchestration import Orchestrator; print('orchestration OK')"
          python -c "from nonull import Nonull; print('nonull OK')"

      - name: Run guard test
        run: |
          python -m pytest tests/test_no_experimental_imports.py -v

      - name: Run full test suite
        run: |
          python -m pytest tests/ -v --tb=short

  marketing-claims:
    name: Verify no forbidden marketing claims
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for forbidden marketing claims
        run: |
          ! grep -rn "ASIL-D Ready" docs/ README.md CLAUDE.md AGENT.md || (echo "ERROR: ASIL-D Ready claim found" && exit 1)
          ! grep -rn "ISO 26262 Compliant" docs/ README.md CLAUDE.md AGENT.md || (echo "ERROR: ISO 26262 Compliant claim found" && exit 1)
          ! grep -rn "production-ready" docs/ README.md CLAUDE.md AGENT.md || (echo "ERROR: production-ready claim found" && exit 1)
          ! grep -rn "certified safety" docs/ README.md CLAUDE.md AGENT.md || (echo "ERROR: certified safety claim found" && exit 1)
          ! grep -rn "车规级" docs/ README.md CLAUDE.md AGENT.md || (echo "ERROR: 车规级 claim found" && exit 1)
          echo "✓ No forbidden marketing claims found"
