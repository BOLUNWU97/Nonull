name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Test on Python 3.10
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Verify package can be imported
        run: |
          python -c "from core import NonullConfig; print('core OK')"
          python -c "from channels import CLIChannel; print('channels OK')"
          python -c "from persona import PersonaOrchestrator, PersonaType, ScenarioEngine; print('persona OK')"
          python -c "from safety import SafetyGuardian; print('safety OK')"
          python -c "from memory import Neocortex; print('memory OK')"
          python -c "from skills import SkillRegistry; print('skills OK')"
          python -c "from orchestration import Orchestrator; print('orchestration OK')"
          python -c "from nonull import Nonull; print('nonull OK')"

      - name: Run guard test (no experimental imports)
        run: |
          python -m pytest tests/test_no_experimental_imports.py -v

      - name: Run full test suite
        run: |
          python -m pytest tests/ -v --tb=short
