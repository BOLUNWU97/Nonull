name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check core/ memory/ safety/ skills/ orchestration/ persona/ channels/ hooks/ nonull/ || echo "ruff not strict"

      - name: Verify package can be imported
        run: |
          python -c "from core import NonullConfig; print('core OK')"
          python -c "from channels import CLIChannel; print('channels OK')"
          python -c "from persona import PersonaOrchestrator, PersonaType, ScenarioEngine, SafetyBadgeSystem; print('persona OK')"
          python -c "from safety import SafetyGuardian; print('safety OK')"
          python -c "from memory import Neocortex; print('memory OK')"
          python -c "from skills import SkillRegistry; print('skills OK')"
          python -c "from orchestration import Orchestrator; print('orchestration OK')"
          python -c "from nonull import Nonull; print('nonull OK')"

      - name: Run guard test
        run: |
          python -m pytest tests/test_no_experimental_imports.py -v

      - name: Run quickstart smoke test
        run: |
          python -m pytest tests/test_quickstart_runs.py -v

      - name: Run full test suite
        run: |
          python -m pytest tests/ -v --tb=short

  marketing-claims:
    name: Verify no forbidden marketing claims
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -e ".[dev]"
      - name: Run marketing-claims guard
        run: |
          python -m pytest tests/test_no_marketing_claims.py -v
