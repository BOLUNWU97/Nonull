# Nonull Default Configuration 默认配置

agent:
  name: Nonull
  version: 1.0.0
  mode: interactive  # interactive | autonomous | plan
  model:
    provider: auto
    temperature: 0.2
    max_tokens: 4096

memory:
  neocortex:
    enabled: true
    # The previous "capacity: 1e9" was aspirational. The default in-memory
    # backend caps useful scale at ~10K entries per process. Tune to your
    # host's RAM or wire up a real vector backend (see
    # docs/architecture.md §5.4).
    max_entries: 10000  # per-layer soft cap
    backend: in_memory  # in_memory | faiss | milvus | pgvector | ...
    index_speed: fast
  subconscious:
    enabled: true
    cycles_per_day: 10000

safety:
  strictness: 4  # 1-5, 5=max strict
  deny_first: true
  iso26262: true
  audit_log: true
  # The safety layer is ADVISORY ONLY.
  # This project is NOT certified for ISO 26262 / ASIL-D production deployment.
  # Do not use for safety-critical decisions or as a substitute for a certified safety element.
  disclaimer: "advisory_only"  # advisory_only | certified  (always set to advisory_only in this project)

orchestration:
  max_concurrent_agents: 8
  default_pattern: nexus_tendrils
  workflow_persistence: true

skills:
  auto_discover: true
  marketplace_enabled: true

# P15: domain abstraction layer
# Each domain package is an independent, pluggable bundle of skills,
# personas, scenarios, and disclaimers. The default install ships with
# the 'general' fallback (always active) and 'adas' (the original
# autonomous-driving domain, now isolated). To drop ADAS or add a custom
# domain, modify this list and re-launch.
domains:
  enabled:
    - general    # always active, cannot be deactivated
    - adas       # default-on; deactivate via reg.deactivate('adas')
  # To add a custom domain, drop a package under domains/ that implements
  # the DomainPackage protocol and add its name to the list above. See
  # CLAUDE.md §"How to add your own domain" for a working 10-line example.
  # custom_paths:
  #   - ./my_custom_domain

channels:
  - cli
  - gateway

web:
  enabled: false          # set to true to launch the FastAPI web UI alongside the CLI
  host: 127.0.0.1         # bind host; override with NONULL_WEB_HOST env var
  port: 8765              # bind port; override with NONULL_WEB_PORT env var
  # The web UI is a developer convenience (chat / skill browser / scenario
  # visualizer). It is NOT a production deployment target and must remain
  # bound to localhost by default.

profiles:
  default:
    workspace: ./workspace
    log_level: INFO
